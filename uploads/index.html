<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0c3b1f" />
  <title>دليل الزائر الذكي — مهرجان المانجو 15 بالقنفذة 2026</title>
  <meta name="description" content="الدليل الإلكتروني التفاعلي لزوار مهرجان المانجو الخامس عشر بمحافظة القنفذة 2026" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Noto+Sans+Devanagari:wght@500;700&family=Noto+Nastaliq+Urdu:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Language selection overlay -->
  <section id="lang-screen" class="lang-screen" aria-label="Language selection">
    <div class="lang-bg"></div>
    <div class="lang-card">
      <div class="lang-logos">
        <img src="assets/ministry-logo.png" alt="وزارة البيئة والمياه والزراعة" class="lang-logo-ministry"/>
        <img src="assets/festival-logo.png" alt="مهرجان المانجو 15 - القنفذة 2026" class="lang-logo-festival"/>
      </div>
      <h1 class="lang-title">
        <span>مرحباً بكم</span>
        <span>Welcome</span>
        <span lang="ur" dir="rtl">خوش آمدید</span>
        <span lang="hi">स्वागत है</span>
      </h1>
      <p class="lang-sub">اختر لغتك المفضلة / Choose your language</p>
      <div class="lang-grid">
        <button class="lang-btn" data-lang="ar">
          <span class="flag">🇸🇦</span>
          <span class="name">العربية</span>
          <span class="native">Arabic</span>
        </button>
        <button class="lang-btn" data-lang="en">
          <span class="flag">🇬🇧</span>
          <span class="name">English</span>
          <span class="native">الإنجليزية</span>
        </button>
        <button class="lang-btn" data-lang="ur">
          <span class="flag">🇵🇰</span>
          <span class="name" lang="ur">اُردُو</span>
          <span class="native">Urdu</span>
        </button>
        <button class="lang-btn" data-lang="hi">
          <span class="flag">🇮🇳</span>
          <span class="name" lang="hi">हिन्दी</span>
          <span class="native">Hindi</span>
        </button>
      </div>
    </div>
  </section>

  <!-- Main app -->
  <div id="app" class="app hidden">

    <!-- Header -->
    <header class="site-header">
      <div class="header-inner">
        <div class="header-brand">
          <img src="assets/ministry-logo.png" alt="" class="brand-ministry"/>
          <span class="brand-divider"></span>
          <img src="assets/festival-logo.png" alt="" class="brand-festival"/>
        </div>
        <div class="header-tools">
          <button class="tool-btn" id="btn-lang" aria-label="language">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18"/>
            </svg>
            <span id="lang-label">العربية</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Hero -->
    <section class="hero">
      <div class="hero-bg"></div>
      <div class="hero-inner">
        <span class="hero-chip" data-i18n="hero.chip"></span>
        <h1 class="hero-title" data-i18n="hero.title"></h1>
        <p class="hero-sub" data-i18n="hero.sub"></p>
        <div class="hero-meta">
          <div class="meta-item">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s7-7.5 7-13a7 7 0 1 0-14 0c0 5.5 7 13 7 13z"/><circle cx="12" cy="9" r="2.5"/></svg>
            <span data-i18n="hero.location"></span>
          </div>
          <div class="meta-item">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 11h18"/></svg>
            <span data-i18n="hero.edition"></span>
          </div>
        </div>
        <div class="hero-ctas">
          <a class="btn btn-primary" href="#map" data-i18n="hero.cta_map"></a>
          <a class="btn btn-ghost" href="#events" data-i18n="hero.cta_events"></a>
        </div>
      </div>
    </section>

    <!-- Quick nav -->
    <nav class="quick-nav" aria-label="sections">
      <a href="#about" class="qn"><span class="qn-ico">🌿</span><span data-i18n="nav.about"></span></a>
      <a href="#map" class="qn"><span class="qn-ico">🗺️</span><span data-i18n="nav.map"></span></a>
      <a href="#varieties" class="qn"><span class="qn-ico">🥭</span><span data-i18n="nav.varieties"></span></a>
      <a href="#events" class="qn"><span class="qn-ico">🎪</span><span data-i18n="nav.events"></span></a>
      <a href="#location" class="qn"><span class="qn-ico">📍</span><span data-i18n="nav.location"></span></a>
    </nav>

    <!-- About -->
    <section id="about" class="section">
      <div class="container">
        <header class="section-head">
          <span class="eyebrow" data-i18n="about.eyebrow"></span>
          <h2 data-i18n="about.title"></h2>
        </header>
        <div class="about-grid">
          <div class="about-text">
            <p data-i18n="about.p1"></p>
            <p data-i18n="about.p2"></p>
          </div>
          <div class="stats">
            <div class="stat"><b>15</b><span data-i18n="about.stat_edition"></span></div>
            <div class="stat"><b>4</b><span data-i18n="about.stat_langs"></span></div>
            <div class="stat"><b>100%</b><span data-i18n="about.stat_web"></span></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Map -->
    <section id="map" class="section section-alt">
      <div class="container">
        <header class="section-head">
          <span class="eyebrow" data-i18n="map.eyebrow"></span>
          <h2 data-i18n="map.title"></h2>
          <p class="section-sub" data-i18n="map.sub"></p>
        </header>
        <div class="map-wrap">
          <svg class="festival-map" viewBox="0 0 900 520" role="img" aria-label="festival map">
            <defs>
              <pattern id="grass" width="6" height="6" patternUnits="userSpaceOnUse">
                <rect width="6" height="6" fill="#e9f5ec"/>
                <circle cx="3" cy="3" r="0.6" fill="#b9dcc2"/>
              </pattern>
            </defs>
            <rect width="900" height="520" fill="url(#grass)"/>
            <!-- paths -->
            <path d="M60,260 H840" stroke="#d9c79a" stroke-width="18" fill="none"/>
            <path d="M450,60 V460" stroke="#d9c79a" stroke-width="18" fill="none"/>
            <!-- zones -->
            <g class="zone" data-zone="gate">
              <rect x="40" y="240" width="70" height="40" rx="8" fill="#0c3b1f"/>
              <text x="75" y="265" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">⛩</text>
            </g>
            <g class="zone" data-zone="pavilions">
              <rect x="140" y="110" width="230" height="110" rx="12" fill="#2aa765"/>
              <text x="255" y="170" text-anchor="middle" fill="#fff" font-size="20" font-weight="800" data-i18n="map.pavilions"></text>
            </g>
            <g class="zone" data-zone="stage">
              <rect x="540" y="110" width="230" height="110" rx="12" fill="#ff7e1a"/>
              <text x="655" y="170" text-anchor="middle" fill="#fff" font-size="20" font-weight="800" data-i18n="map.stage"></text>
            </g>
            <g class="zone" data-zone="families">
              <rect x="140" y="310" width="230" height="110" rx="12" fill="#b56a2a"/>
              <text x="255" y="370" text-anchor="middle" fill="#fff" font-size="18" font-weight="800" data-i18n="map.families"></text>
            </g>
            <g class="zone" data-zone="parking">
              <rect x="540" y="310" width="230" height="110" rx="12" fill="#4b6a88"/>
              <text x="655" y="370" text-anchor="middle" fill="#fff" font-size="20" font-weight="800" data-i18n="map.parking"></text>
            </g>
            <g class="zone" data-zone="restrooms">
              <rect x="800" y="240" width="60" height="40" rx="8" fill="#0c3b1f"/>
              <text x="830" y="267" text-anchor="middle" fill="#fff" font-size="18">🚻</text>
            </g>
          </svg>
          <div class="legend">
            <div><span class="dot" style="background:#0c3b1f"></span><span data-i18n="map.gate"></span></div>
            <div><span class="dot" style="background:#2aa765"></span><span data-i18n="map.pavilions"></span></div>
            <div><span class="dot" style="background:#ff7e1a"></span><span data-i18n="map.stage"></span></div>
            <div><span class="dot" style="background:#b56a2a"></span><span data-i18n="map.families"></span></div>
            <div><span class="dot" style="background:#4b6a88"></span><span data-i18n="map.parking"></span></div>
            <div><span class="dot" style="background:#0c3b1f"></span><span data-i18n="map.restrooms"></span></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Varieties -->
    <section id="varieties" class="section">
      <div class="container">
        <header class="section-head">
          <span class="eyebrow" data-i18n="varieties.eyebrow"></span>
          <h2 data-i18n="varieties.title"></h2>
          <p class="section-sub" data-i18n="varieties.sub"></p>
        </header>
        <div class="cards">
          <article class="card mango-card">
            <div class="mango-art a1"></div>
            <h3 data-i18n="varieties.k1.name"></h3>
            <p data-i18n="varieties.k1.desc"></p>
          </article>
          <article class="card mango-card">
            <div class="mango-art a2"></div>
            <h3 data-i18n="varieties.k2.name"></h3>
            <p data-i18n="varieties.k2.desc"></p>
          </article>
          <article class="card mango-card">
            <div class="mango-art a3"></div>
            <h3 data-i18n="varieties.k3.name"></h3>
            <p data-i18n="varieties.k3.desc"></p>
          </article>
          <article class="card mango-card">
            <div class="mango-art a4"></div>
            <h3 data-i18n="varieties.k4.name"></h3>
            <p data-i18n="varieties.k4.desc"></p>
          </article>
        </div>
      </div>
    </section>

    <!-- Events -->
    <section id="events" class="section section-alt">
      <div class="container">
        <header class="section-head">
          <span class="eyebrow" data-i18n="events.eyebrow"></span>
          <h2 data-i18n="events.title"></h2>
          <p class="section-sub" data-i18n="events.sub"></p>
        </header>
        <div class="timeline" id="timeline"></div>
      </div>
    </section>

    <!-- Location -->
    <section id="location" class="section">
      <div class="container">
        <header class="section-head">
          <span class="eyebrow" data-i18n="location.eyebrow"></span>
          <h2 data-i18n="location.title"></h2>
        </header>
        <div class="location-card">
          <div class="loc-info">
            <div class="loc-row">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s7-7.5 7-13a7 7 0 1 0-14 0c0 5.5 7 13 7 13z"/><circle cx="12" cy="9" r="2.5"/></svg>
              <div>
                <b data-i18n="location.addr_label"></b>
                <span data-i18n="location.addr_value"></span>
              </div>
            </div>
            <div class="loc-row">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
              <div>
                <b data-i18n="location.hours_label"></b>
                <span data-i18n="location.hours_value"></span>
              </div>
            </div>
            <a class="btn btn-primary btn-lg" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=%D8%A7%D9%84%D8%AD%D8%AF%D9%8A%D9%82%D8%A9+%D8%A7%D9%84%D8%B9%D8%A7%D9%85%D8%A9+%D8%A7%D9%84%D9%82%D9%86%D9%81%D8%B0%D8%A9" data-i18n="location.cta"></a>
          </div>
          <iframe class="loc-map" title="map" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
            src="https://www.google.com/maps?q=%D8%A7%D9%84%D8%AD%D8%AF%D9%8A%D9%82%D8%A9%20%D8%A7%D9%84%D8%B9%D8%A7%D9%85%D8%A9%20%D8%A7%D9%84%D9%82%D9%86%D9%81%D8%B0%D8%A9&output=embed"></iframe>
        </div>
      </div>
    </section>

    <!-- Features -->
    <section class="section features-section">
      <div class="container">
        <header class="section-head">
          <span class="eyebrow" data-i18n="features.eyebrow"></span>
          <h2 data-i18n="features.title"></h2>
        </header>
        <div class="features">
          <div class="feature"><span class="f-ico">🌍</span><h4 data-i18n="features.f1_t"></h4><p data-i18n="features.f1_d"></p></div>
          <div class="feature"><span class="f-ico">⚡</span><h4 data-i18n="features.f2_t"></h4><p data-i18n="features.f2_d"></p></div>
          <div class="feature"><span class="f-ico">📱</span><h4 data-i18n="features.f3_t"></h4><p data-i18n="features.f3_d"></p></div>
          <div class="feature"><span class="f-ico">🔄</span><h4 data-i18n="features.f4_t"></h4><p data-i18n="features.f4_d"></p></div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-brand">
          <img src="assets/festival-logo.png" alt=""/>
          <img src="assets/ministry-logo.png" alt=""/>
        </div>
        <p data-i18n="footer.line"></p>
        <small data-i18n="footer.copy"></small>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
